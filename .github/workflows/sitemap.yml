name: Generate sitemap
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: generate-sitemap
        uses: cicirello/generate-sitemap@v1.9.2
        with:
          base-url-path: https://SputnikTETO.github.io/
