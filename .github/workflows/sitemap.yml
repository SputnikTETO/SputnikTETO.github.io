name: Generate sitemap
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: generate-sitemap
        uses: cicirello/generate-sitemap@v1.10.4
        with:
          base-url-path: https://vier.ink/
          path-to-root: .
          include-html: true
          include-pdf: true
